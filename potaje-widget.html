um Asia Sakura \u2014 Soup", "vitro": "Vitrocer\u00e1mica / Inducci\u00f3n", "thermomix": "Thermomix", "panda_slow": "Yum Asia Panda \u2014 Slow Cook", "fuji_slow": "Yum Asia Fuji IH \u2014 Slow Cook"};var CAPMAX={"sakura_slow": 6, "sakura_soup": 6, "vitro": 99, "thermomix": 6, "panda_slow": 3, "fuji_slow": 6};var TIMINGS={"sakura_slow": [["1", "Sofrito r\u00e1pido: cebolla + ajo + piment\u00f3n en sart\u00e9n 4 min", "Sart\u00e9n", "4 min", "T+4"], ["2", "Montar Sakura: garbanzos + espinacas + bacalao + tomate + caldo + sofrito + laurel + comino", "Cuenco Sakura", "3 min", "T+7"], ["3", "SLOW COOK 2h \u2192 START", "Sakura", "2h", "T+2h7"], ["4", "Rectificar sal. Retirar laurel. Reposar 10 min KEEP WARM", "Sakura", "10 min", "T+2h17"]], "sakura_soup": [["1", "Sofrito r\u00e1pido: cebolla + ajo + piment\u00f3n en sart\u00e9n 4 min", "Sart\u00e9n", "4 min", "T+4"], ["2", "Montar Sakura: todos los ingredientes", "Cuenco Sakura", "3 min", "T+7"], ["3", "SOUP 1h \u2192 START (m\u00ednimo). Ajustar hasta 2h si se quiere m\u00e1s concentrado", "Sakura SOUP", "1h", "T+1h7"], ["4", "Rectificar sal. Retirar laurel", "Sakura", "5 min", "T+1h12"]], "vitro": [["1", "Sofreir cebolla + ajo en aceite 5 min. A\u00f1adir piment\u00f3n y tomate frito 2 min", "Cazuela", "7 min", "T+7"], ["2", "A\u00f1adir garbanzos + caldo + laurel + comino. Hervir 5 min", "Cazuela", "5 min", "T+12"], ["3", "A\u00f1adir espinacas. Cocer 5 min tapado", "Cazuela", "5 min", "T+17"], ["4", "A\u00f1adir bacalao. Fuego m\u00ednimo 8-10 min hasta que se deshaga", "Cazuela", "10 min", "T+27"], ["5", "Rectificar sal. Retirar laurel. Reposar 5 min", "Cazuela", "5 min", "T+32"]], "thermomix": [["1", "Sofreir cebolla + ajo + piment\u00f3n: 5 min / 120\u00b0C / vel 1", "Thermomix", "5 min", "T+5"], ["2", "A\u00f1adir tomate, garbanzos, caldo, laurel, comino: 15 min / 100\u00b0C / giro inverso / vel cuchara", "Thermomix", "15 min", "T+20"], ["3", "A\u00f1adir espinacas y bacalao: 10 min / 100\u00b0C / giro inverso olla + ajo en sart\u00e9n 3 min. A\u00f1ade piment\u00f3n 1 min fuera del fuego."], ["2", "Sakura \u2014 Montar", "Todos los ingredientes en el cuenco: garbanzos, espinacas, bacalao, tomate, caldo, sofrito, laurel y comino."], ["3", "SOUP 1-2 horas", "SOUP \u2192 ajusta entre 1h y 2h \u2014 con 1h queda m\u00e1s caldoso, con 2h m\u00e1s concentrado y espeso. El m\u00ednimo del SOUP es 1 hora."], ["4", "Rectificar sal", "Retirar laurel. Probar y rectificar sal. Servir caliente."]], "vitro": [["1", "Cazuela \u2014 Sofrito", "Aceite a fuego medio. Cebolla y ajo 5 minutos hasta pochados. A\u00f1ade el piment\u00f3n \u2014 fuera del fuego o baja la llama al m\u00ednimo para que no se queme. A\u00f1ade el tomate frito y cocina 2 minutos m\u00e1s."], ["2", "Garbanzos y caldo", "A\u00f1ade los garbanzos escurridos, el caldo, el laurel y el comino. Lleva a ebullici\u00f3n y cocina 5 minutos para que los garbanzos cojan el sabor del sofrito."], ["3", "Espinacas", "A\u00f1ade las espinacas. Tapa y cocina 5 minutos \u2014 se reducen mucho. Si son congeladas, esperar a que se descongelen completamente antes de seguir."], ["4", "Bacalao \u2014 el toque final", "A\u00f1ade el bacalao en trozos. Fuego m\u00ednimo, tapado, 8-10 minutos. El bacalao no necesita m\u00e1s \u2014 se deshilacha solo con el calor residual. Si se cuece demasiado pierde textura y queda gomoso."], ["5", "Reposar y servir", "Retira el laurel. Rectifica sal con cuidado. Reposar 5 minutos tapado antes de servir. El potaje mejora de un d\u00eda para otro."]], "thermomix": [["1", "Thermomix \u2014 Sofrito", "Cebolla, ajo y aceite: 5 min / 120\u00b0C / vel 1. A\u00f1ade piment\u00f3n y tomate: 2 min / 100\u00b0C / vel 1."], ["2", "Thermomix \u2014 Garbanzos y caldo", "A\u00f1ade garbanzos, caldo, laurel y comino: 15 min / 100\u00b0C / giro inverso / vel cuchara."], ["3", "Thermomix \u2014 Espinacas y bacalao", "A\u00f1ade espinacas y bacalao en trozos: 10 min / 100\u00b0C / giro inverso / vel cuchara. El giro inverso protege los trozos de bacalao."], ["4", "Rectificar y servir", "Retira el laurel. Prueba la sal \u2014 el bacalao suele salar suficiente. Servir."]], "panda_slow": [["1", "Sart\u00e9n \u2014 Sofrito r\u00e1pido", "Sofr\u00ede cebolla + ajo en sart\u00e9n 3 min. A\u00f1ade piment\u00f3n 1 min fuera del fuego. M\u00e1ximo 3 raciones en el Panda."], ["2", "Panda \u2014 Montar", "En el cuenco: garbanzos escurridos, espinacas, bacalao, tomate frito, caldo, sofrito, laurel y comino. Sin sal todav\u00eda."], ["3", "SLOW COOK 2 horas", "SLOW COOK \u2192 2h \u2192 START. Mismos tiempos que la Sakura. No abrir durante la cocci\u00f3n."], ["4", "Rectificar y reposar", "Retirar laurel. Probar sal. KEEP WARM 10 minutos antes de servir."]], "fuji_slow": [["1", "Sart\u00e9n \u2014 Sofrito r\u00e1pido", "Sofr\u00ede cebolla + ajo en sart\u00e9n 3 min. A\u00f1ade piment\u00f3n 1 min fuera del fuego. La inducci\u00f3n IH del Fuji da una cocci\u00f3n muy uniforme."], ["2", "Fuji IH \u2014 Montar", "En el cuenco: garbanzos, espinacas, bacalao, tomate frito, caldo, sofrito, laurel y comino."], ["3", "SLOW COOK 2 horas", "SLOW COOK \u2192 2h \u2192 START. La IH distribuye el calor mejor que la resistencia directa \u2014 el resultado es ligeramente m\u00e1s uniforme."], ["4", "Rectificar y reposar", "Retirar laurel. Probar sal. KEEP WARM 10 minutos."]]};var TIMERS_DATA={"sakura_slow": [240, null, 7200, 600], "sakura_soup": [240, null, 3600, null], "vitro": [420, 300, 300, 600, 300], "thermomix": [300, 900, 600, null]};var PRO=[["Sal del bacalao", "Potaje salado si el bacalao no estaba bien desalado", "Desalar 24-48h cambiando el agua cada 8h. Probar un trozo antes de usarlo. No anadir sal hasta el final"], ["Bacalao gomoso", "Coccion excesiva", "Anadir siempre al final y con fuego minimo. Se hace en 8-10 min. En Slow Cook se deshilacha solo sin pasarse"], ["Potaje demasiado caldoso", "Mucho liquido o garbanzos que no espesaron", "Chafar 3-4 garbanzos contra la pared de la cazuela y mez |[],tmrs=TIMERS_DATA[met]||[],html="";pasos.forEach(function(p,i){var isActive=activeStep===i,isDone=completedSteps.has(i);var key=met+"-"+i,tmrSec=tmrs[i]||0,tmrVal=timerValues[key]!==undefined?timerValues[key]:tmrSec;var tmrCls=timerIntervals[i]?"run":(tmrVal<=0&&tmrSec>0?"end":"");var tmrHtml="";if(tmrSec>0){tmrHtml="<div class='tmr-row'><div class='tmr "+tmrCls+"' id='tmr-"+i+"'>"+(tmrVal<=0?"Listo!":fmtTime(tmrVal))+"</div>";if(tmrVal>0)tmrHtml+="<button class='btn-tmr"+(timerIntervals[i]?" stop":"")+" ' id='btn-tmr-"+i+"' onclick='"+(timerIntervals[i]?"stopTimer":"startTimer")+"("+i+");event.stopPropagation();'>"+(timerIntervals[i]?"Parar":"Iniciar timer")+"</button>";tmrHtml+="</div>";}html+="<div class='step"+(isActive?" active":"")+(isDone?" done":"")+" ' onclick='toggleStep("+i+")' ><div class='step-hd'><div class='step-n'>"+(isDone?"":p[0])+"</div><div class='step-tit'>"+p[1]+"</div>";if(isActive)html+="<button class='btn-done' onclick='doneStep("+i+",event)'>"+(isDone?"Deshacer":"Hecho")+"</button>";html+="</div><div class='step-bod'>"+p[2]+tmrHtml+"</div></div>";});document.getElementById("pasos-list").innerHTML=html;}function toggleStep(i){activeStep=(activeStep===i?null:i);renderPasos();}function doneStep(i,e){e.stopPropagation();completedSteps.has(i)?completedSteps.delete(i):completedSteps.add(i);if(completedSteps.has(i)&&activeStep===i){var pasos=PASOS[met]||[];activeStep=i+1<pasos.length?i+1:null;}renderPasos();}function renderPro(){var html="<div class='pro-grid'>";PRO.forEach(function(p){html+="<div class='pro-item'><b>"+p[0]+"</b><strong>"+p[1]+"</strong> &#8594; "+p[2]+"</div>";});html+="</div>";document.getElementById("pro-list").innerHTML=html;}function changeMet(){met=document.getElementById("met-sel").value;timerIntervals={};activeStep=null;completedSteps.clear();render();}function changeServings(d){servings=Math.max(1,Math.min(8,servings+d));document.getElementById("cnt").textContent=servings;document.getElementById("srv-lbl").textContent=
