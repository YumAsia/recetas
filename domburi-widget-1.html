<!DOCTYPE html>
<html lang="es">
<head>

<title>Arroz con Cebolla y Carne Picada</title>
<style>
:root{--bg:#0a0d0d;--card:#141c1e;--accent:#4abfaa;--accent2:#2a8a78;--text:#e5f5f2;--muted:#4a7a70;--border:#1a2a28;--green:#5abf7a;--red:#e05555}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",system-ui,sans-serif;min-height:100vh;padding:1.5rem 1rem}
@import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap");
.wrap{max-width:700px;margin:0 auto}
.hd{text-align:center;margin-bottom:2rem;animation:fadeDown .6s ease both}
.tag{display:inline-block;background:var(--accent2);color:#fff;font-size:.7rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:.3rem .9rem;border-radius:2px;margin-bottom:.9rem}
h1{font-family:"Playfair Display",serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;line-height:1.1;color:var(--text);margin-bottom:.4rem}
h1 span{color:var(--accent)}
.sub{color:var(--muted);font-size:.9rem;font-weight:300}
.pills{display:flex;justify-content:center;gap:.6rem;flex-wrap:wrap;margin:1.2rem 0 1.8rem}
.pill{background:var(--card);border:1px solid var(--border);border-radius:999px;padding:.35rem .9rem;font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:.35rem}
.pill b{color:var(--accent);font-weight:500}
.ctrl{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:1.2rem;display:grid;grid-template-columns:1fr 1fr;gap:1rem;animation:fadeUp .5s .15s ease both}
@media(max-width:480px){.ctrl{grid-template-columns:1fr}}
.ctrl-lbl{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.counter{display:flex;align-items:center;gap:.8rem}
.btn-c{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-c:hover{background:var(--accent);border-color:var(--accent);color:#000}
.cnt{font-family:"Playfair Display",serif;font-size:1.6rem;font-weight:700;color:var(--accent);min-width:1.8rem;text-align:center}
.met-sel{width:100%;padding:.6rem .8rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;font-family:"DM Sans",sans-serif;cursor:pointer;appearance:none}
.met-sel:focus{outline:none;border-color:var(--accent)}
.cap-alert{background:#2a1010;border:1px solid var(--red);border-radius:8px;padding:.7rem 1rem;font-size:.82rem;color:var(--red);margin-bottom:.8rem;display:none}
.cap-alert.show{display:block}
.sec{margin-bottom:1.2rem;animation:fadeUp .5s .3s ease both}
.sec-title{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.ing{display:flex;align-items:center;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid var(--border)}
.ing:last-child{border-bottom:none}
.ing-l{display:flex;align-items:center;gap:.65rem}
.chk{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chk.on{background:var(--green);border-color:var(--green)}
.chk.on::after{content:"V";font-size:.68rem;color:#fff;font-weight:700}
.ing-nom{font-size:.88rem;transition:color .2s}
.ing-nom.on{color:var(--muted);text-decoration:line-through}
.ing-sub{display:block;font-size:.72rem;color:var(--muted);font-style:italic;margin-top:1px}
.ing-qty{font-size:.83rem;color:var(--accent);font-weight:500;text-align:right;white-space:nowrap}
.tw{overflow-x:auto;margin-bottom:.5rem}
table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:360px}
th{background:var(--bg);border-bottom:1px solid var(--border);padding:.45rem .6rem;text-align:left;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);white-space:nowrap}
td{padding:.5rem .6rem;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4}
tr:last-child td{border-bottom:none}
.tn{text-align:center;font-weight:700;color:var(--accent);width:20px}
.td{color:var(--accent);font-weight:600;white-space:nowrap;font-size:.78rem}
.ta{color:var(--muted);white-space:nowrap;font-size:.78rem}
.step{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:.6rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.step::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .3s}
.step.active::before{background:var(--accent)}
.step.done::before{background:var(--green)}
.step-hd{display:flex;align-items:center;gap:.65rem}
.step-n{width:26px;height:26px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:500;color:var(--muted);flex-shrink:0;transition:all .3s}
.step.active .step-n{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.step.done .step-n{background:var(--green);border-color:var(--green);color:#fff}
.step-tit{font-size:.88rem;font-weight:500;flex:1;transition:color .2s}
.step.done .step-tit{color:var(--muted)}
.step-bod{display:none;margin-top:.65rem;padding-top:.65rem;border-top:1px solid var(--border);font-size:.83rem;color:#a09888;line-height:1.65}
.step.active .step-bod{display:block}
.btn-done{padding:.25rem .7rem;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:.7rem;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s;flex-shrink:0}
.btn-done:hover{background:var(--accent);color:#000}
.tmr-row{display:flex;align-items:center;gap:.65rem;margin-top:.65rem}
.tmr{font-family:"Playfair Display",serif;font-size:1.3rem;color:var(--accent);font-weight:700;min-width:3.8rem}
.tmr.run{color:var(--green)}.tmr.end{color:var(--red)}
.btn-tmr{padding:.3rem .8rem;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:.72rem;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s}
.btn-tmr:hover{background:var(--accent);color:#000}
.btn-tmr.stop{border-color:var(--red);color:var(--red)}
.btn-tmr.stop:hover{background:var(--red);color:#fff}
.recipe-img img{width:100%;height:320px;object-fit:cover;display:block;border-radius:12px;margin-bottom:1.2rem}
.pro-grid{display:grid;gap:.6rem}
.pro-item{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent2);border-radius:8px;padding:.8rem 1rem;font-size:.82rem;line-height:1.6;color:var(--muted)}
.pro-item b{color:var(--accent);display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.25rem}
.pro-item strong{color:var(--text)}
.ft{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;font-size:.75rem;color:var(--muted)}
.ft a{color:var(--accent);text-decoration:none}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

in", "T+57"], ["7", "Emplatar con s\u00e9samo negro", "Mesa", "2 min", "T+59"]], "panda": [["1", "Lavar arroz 2-3 veces", "Cuenco Panda", "3 min", "T+3"], ["2", "Cortar cebolla y ajo", "Tabla de corte", "5 min", "T+8"], ["3", "Montar capas en el Panda: arroz \u2192 agua l\u00ednea SHORT GRAIN \u2192 cebolla \u2192 ajo \u2192 carne desmenuzada", "Panda", "3 min", "T+11"], ["4", "A\u00f1adir soja + mirin. No mezclar", "Panda", "1 min", "T+12"], ["5", "SHORT GRAIN \u2192 START", "Panda", "~35 min", "T+47"], ["6", "KEEP WARM: a\u00f1adir s\u00e9samo, mezclar, reposar 5 min", "Panda", "5 min", "T+52"], ["7", "Emplatar", "Mesa", "2 min", "T+54"]], "fuji": [["1", "Lavar arroz 2-3 veces", "Cuenco Fuji", "3 min", "T+3"], ["2", "Cortar cebolla y ajo", "Tabla de corte", "5 min", "T+8"], ["3", "Montar capas: arroz \u2192 agua l\u00ednea WHITE RICE \u2192 cebolla \u2192 ajo \u2192 carne desmenuzada", "Fuji IH", "3 min", "T+11"], ["4", "A\u00f1adir soja + mirin. No mezclar", "Fuji IH", "1 min", "T+12"], ["5", "WHITE RICE \u2192 START. La inducci\u00f3n IH da una cocci\u00f3n muy uniforme", "Fuji IH", "~35 min", "T+47"], ["6", "KEEP WARM: a\u00f1adir aceite de s\u00e9samo, mezclar, reposar 5 min", "Fuji IH", "5 min", "T+52"], ["7", "Emplatar con s\u00e9samo negro", "Mesa", "2 min", "T+54"]], "basica": [["1", "Lavar arroz 2-3 veces", "Cuenco arrocera", "3 min", "T+3"], ["2", "Cortar cebolla y ajo", "Tabla de corte", "5 min", "T+8"], ["3", "Montar capas: arroz \u2192 agua seg\u00fan marca \u2192 cebolla \u2192 ajo \u2192 carne desmenuzada", "Arrocera", "3 min", "T+11"], ["4", "A\u00f1adir soja + mirin. No mezclar", "Arrocera", "1 min", "T+12"], ["5", "Pulsar COOK y esperar a que salte a WARM autom\u00e1ticamente", "Arrocera", "~30-40 min", "T+52"], ["6", "WARM: a\u00f1adir aceite de s\u00e9samo, mezclar suavemente, reposar 5 min", "Arrocera", "5 min", "T+57"], ["7", "Emplatar con s\u00e9samo negro", "Mesa", "2 min", "T+59"]], "vitro": [["1", "Lavar arroz", "Colador", "3 min", "T+3"]
