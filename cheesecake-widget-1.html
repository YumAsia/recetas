<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tarta de Queso Japonesa</title><style>
:root{--bg:#0d0a0f;--card:#18141f;--accent:#b07ad4;--accent2:#7a4aa0;--text:#f0e8f5;--muted:#6a5080;--border:#251a30;--green:#5abf7a;--red:#e05555}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",system-ui,sans-serif;min-height:100vh;padding:1.5rem 1rem}
@import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap");
.wrap{max-width:700px;margin:0 auto}
.hd{text-align:center;margin-bottom:2rem;animation:fadeDown .6s ease both}
.tag{display:inline-block;background:var(--accent2);color:#fff;font-size:.7rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:.3rem .9rem;border-radius:2px;margin-bottom:.9rem}
h1{font-family:"Playfair Display",serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;line-height:1.1;color:var(--text);margin-bottom:.4rem}

.pills{display:flex;justify-content:center;gap:.6rem;flex-wrap:wrap;margin:1.2rem 0 1.8rem}
.pill{background:var(--card);border:1px solid var(--border);border-radius:999px;padding:.35rem .9rem;font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:.35rem}
.pill b{color:var(--accent);font-weight:500}
.ctrl{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:1.2rem;display:grid;grid-template-columns:1fr 1fr;gap:1rem;animation:fadeUp .5s .15s ease both}
@media(max-width:480px){.ctrl{grid-template-columns:1fr}}
.ctrl-lbl{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.counter{display:flex;align-items:center;gap:.8rem}
.btn-c{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}

.cnt{font-family:"Playfair Display",serif;font-size:1.6rem;font-weight:700;color:var(--accent);min-width:1.8rem;text-align:center}
.met-sel{width:100%;padding:.6rem .8rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;font-family:"DM Sans",sans-serif;cursor:pointer;appearance:none}
.met-sel:focus{outline:none;border-color:var(--accent)}

.cap-alert.show{display:block}
.sec{margin-bottom:1.2rem;animation:fadeUp .5s .3s ease both}

.ing{display:flex;align-items:center;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid var(--border)}
.ing:last-child{border-bottom:none}
.ing-l{display:flex;align-items:center;gap:.65rem}
.chk{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chk.on{background:var(--green);border-color:var(--green)}

.ing-nom{font-size:.88rem;transition:color .2s}

.tw{overflow-x:auto;margin-bottom:.5rem}

td{padding:.5rem .6rem;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4}

.tn{text-align:center;font-weight:700;color:var(--accent);width:20px}
.td{color:var(--accent);font-weight:600;white-space:nowrap;font-size:.78rem}
.ta{color:var(--muted);white-space:nowrap;font-size:.78rem}
.step{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:.6rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.step::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .3s}

.step.active .step-n{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}

.step.active .step-bod{display:block}
.btn-done{padding:.25rem .7rem;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:.7rem;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s;flex-shrink:0}

.tmr-row{display:flex;align-items:center;gap:.65rem;margin-top:.65rem}

.tmr.run{color:var(--green)}.tmr.end{color:var(--red)}
.btn-tmr{padding:.3rem .8rem;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:.72rem;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s}
.btn-tmr:hover{background:var(--accent);color:#000}
.btn-tmr.stop{border-color:var(--red);color:var(--red)}
.btn-tmr.stop:hover{background:var(--red);color:#fff}
.recipe-img img{width:100%;height:320px;object-fit:cover;display:block;border-radius:12px;margin-bottom:1.2rem}
.pro-grid{display:grid;gap:.6rem}
.pro-item{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent2);border-radius:8px;padding:.8rem 1rem;font-size:.82rem;line-height:1.6;color:var(--muted)}
.pro-item b{color:var(--accent);display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.25rem}
.pro-item strong{color:var(--text)}
.ft{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;font-size:.75rem;color:var(--muted)}
.ft a{color:var(--accent);text-decoration:none}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

<option value="horno">Horno convencional — Baño María</option></select></div></div><div class="cap-alert" id="cap-alert"></div><div class="sec"><div class="sec-title">Ingredientes</div><div id="ing-list"></div></div><div class="sec"><div class="sec-title">Orden de preparacion</div><div id="timings-list"></div></div><div class="sec"><div class="sec-title">Pasos</div><div id="pasos-list"></div></div><div class="recipe-img"><img src="https://yumasia.github.io/recetas/img/IMG-20260207-WA0025.jpg" alt="Tarta de queso japonesa" loading="lazy"></div><div class="sec"><div class="sec-title">Consejos PRO</div><div id="pro-list"></div></div><div class="ft"><span>sakuraymas &middot; <a href="https://sakuraymas.blogspot.com/">blogspot.com</a></span><a href="https://www.instagram.com/sakuraymas.es/">@sakuraymas.es</a></div></div><script>var ING=[{"nom": "Queso crema bajo en grasa", "note": "Base cremosa \u2014 atemperar 30-45 min antes", "base": null, "unit": "250 g"}, {"nom": "Mantequilla ligera", "note": "Atemperar junto al queso", "base": null, "unit": "40 g"}, {"nom": "Leche desnatada", "note": "", "base": null, "unit": "100 g"}, {"nom": "Yemas (4 huevos M)", "note": "Separar sobre bol aparte para no contaminar claras", "base": null, "unit": "~60 g"}, {"nom": "Claras (4 huevos M)", "note": "Bol y varillas completamente limpios y secos", "base": null, "unit": "~120 g"}, {"nom": "Eritritol polvo \u2014 parte 1", "note": "Para la mezcla de yemas", "base": null, "unit": "15 g"}, {"nom": "Eritritol polvo \u2014 parte 2", "note": "Para estabilizar el merengue", "base": null, "unit": "70 g"}, {"nom": "Harina de avena fina", "note": "Tamizar junto a la maicena", "base": null, "unit": "50 g"}, {"nom": "Maicena", "note": "Tamizar junto a la harina", "base": null, "unit": "20 g"}, {"nom": "Zumo de lim\u00f3n colado", "note": "Estabiliza las claras y aporta aroma", "base": null, "unit": "10 g"}, {"nom": "Sal", "note": "", "base": null, "unit": "1 g"}, {"nom": "Esencia de vainilla", "note": "Opcional", "base": null, "unit": "2 g"}, {"nom": "Mantequilla para engrasar", "note": "No va en la masa \u2014 solo para el cuenco", "base": null, "unit": "5 g"}];var MET_LABELS={"sakura": "Yum Asia Sakura \u2014 CAKE", "horno": "Horno convencional \u2014 Ba\u00f1o Mar\u00eda"};var CAPMAX={"sakura": 1, "horno": 1};var TIMINGS={"sakura": [["1", "Atemperar queso crema y mantequilla", "Encimera", "30-45 min", "T-45min"], ["2", "Separar y pesar claras y yemas. Claras a nevera", "B\u00e1scula + boles", "5 min", "T+5"], ["3", "Fundir queso + mantequilla + leche al ba\u00f1o mar\u00eda", "Cazo + bol", "6-8 min", "T+13"], ["4", "Templar la base fundida", "Encimera", "5 min", "T+18"], ["5", "A\u00f1adir yemas + eritritol 15g + lim\u00f3n + sal + vainilla", "Bol + esp\u00e1tula", "4-5 min", "T+23"], ["6", "Tamizar harinas e incorporar", "Tamizador + esp\u00e1tula", "3-4 min", "T+27"], ["7", "Montar merengue con claras + eritritol 70g", "Varillas el\u00e9ctricas", "~2 min", "T+29"], ["8", "Integrar merengue en 3 fases envolventes", "Esp\u00e1tula silicona", "5-6 min", "T+35"], ["9", "Engrasar cuenco Sakura, verter masa, golpear", "Cuenco Sakura", "3 min", "T+38"], ["10", "CAKE 60 min \u2192 START", "Sakura", "60 min", "T+98"], ["11", "Comprobar palillo. 2\u00ba ciclo +10 min si necesario", "Sakura", "0-10 min", "T+108"], ["12", "Reposo tapa cerrada en KEEP WARM", "Sakura apagada", "15 min", "T+123"], ["13", "Enfriado a temperatura ambiente", "Encimera", "60 min", "T+183"], ["14", "Nevera con film", "Nevera", "M\u00edn. 4 h", "T+7h"]], "horno": [["1", "Atemperar queso crema y mantequilla", "Encimera", "30-45 min", "T-45min"], ["2", "Precalentar horno a 160\u00b0C. Preparar molde desmontable 18cm con papel de horno", "Horno + molde", "15 min", "T+15"], ["3", "Separar y pesar claras y yemas. Claras a nevera", "B\u00e1scula + boles", "5 min", "T+20"], ["4", "Fundir queso + mantequilla + leche al ba\u00f1o mar\u00eda", "Cazo + bol", "6-8 min", "T+28"], ["5", "Templar la base fundida", "Encimera", "5 min", "T+33"], ["6", "A\u00f1adir yemas + eritritol 15g + lim\u00f3n + sal + vainilla", "Bol + esp\u00e1tula", "4-5 min", "T+38"], ["7", "Tamizar harinas e incorporar", "Tamizador + esp\u00e1tula", "3-4 min", "T+42"], ["8", "Montar merengue con claras + eritritol 70g", "Varillas el\u00e9ctricas", "~2 min", "T+44"], ["9", "Integrar merengue en 3 fases envolventes", "Esp\u00e1tula silicona", "5-6 min", "T+50"], ["10", "Verter en molde. Colocar en bandeja con 2cm agua caliente", "Molde + bandeja", "3 min", "T+53"], ["11", "Hornear 160\u00b0C ba\u00f1o mar\u00eda 50-55 min. No abrir el horno", "Horno", "50-55 min", "T+108"], ["12", "Apagar horno, dejar dentro con puerta entreabierta 15 min", "Horno apagado", "15 min", "T+123"], ["13", "Enfriado a temperatura ambiente", "Encimera", "60 min", "T+183"], ["14", "Nevera con film", "Nevera", "M\u00edn. 4 h", "T+7h"]]};var PASOS={"sakura": [["1", "Encimera \u2014 Atemperado (30-45 min antes)", "Saca de la nevera el queso crema (250g) y la mantequilla (40g). Deja atemperar 30-45 minutos. <strong>PRO:</strong> en cocinas fr\u00edas puedes poner el queso en el microondas 10-12 segundos exactos, solo para ablandarlo."], ["2", "B\u00e1scula + boles \u2014 Separar huevos", "Separa 4 huevos M. Pesa: <strong>~60g de yemas</strong> en un bol y <strong>~120g de claras</strong> en otro bol limpio y seco. Reserva las claras tapadas en nevera. <strong>Atenci\u00f3n:</strong> si cae una gota de yema en las claras no montar\u00e1n. Separa cada huevo sobre un bol peque\u00f1o aparte antes de a\u00f1adirlo al principal."], ["3", "Cazo + bol \u2014 Base cremosa al ba\u00f1o mar\u00eda", "En un bol resistente al calor: queso crema (250g) + mantequilla (40g) + leche (100g). Coloca el bol sobre un cazo con agua caliente a fuego muy bajo. El bol no debe tocar el agua. Remueve con esp\u00e1tula hasta crema completamente lisa. <strong>No dejes que hierva.</strong> Retira y deja templar 5 minutos."], ["4", "Bol + esp\u00e1tula \u2014 Mezcla de yemas", "Con la base tibia (no caliente al tacto), a\u00f1ade: yemas una a una, eritritol parte 1 (15g), zumo de lim\u00f3n (10g), sal (1g) y vainilla (2g). Mezcla suavemente hasta homog\u00e9neo. <strong>Si la mezcla est\u00e1 muy caliente las yemas se cuajan.</strong>"], ["5", "Tamizador + esp\u00e1tula \u2014 Incorporar harinas", "Tamiza la harina de avena (50g) y la maicena (20g) juntas sobre la mezcla. Incorpora con movimientos envolventes de abajo arriba. Para en cuanto no veas grumos. No mezcles de m\u00e1s."], ["6", "Varillas el\u00e9ctricas \u2014 Montar el merengue", "Saca las claras (120g) de la nevera. <strong>Bol y varillas completamente limpios y secos.</strong> Proceso: (1) Velocidad baja 20-30 seg a\u00f1adiendo los 70g de eritritol de golpe. (2) Velocidad media 45-60 seg hasta masa blanca y brillante. (3) Velocidad alta 20-30 seg hasta <strong>picos suaves</strong>. STOP. Punto exacto: pico que se dobla ligeramente en la punta. Vuelca el bol 45\u00b0 \u2014 si el merengue se mueve ligeramente pero no cae, perfecto. <strong>No uses el Turbo.</strong>"], ["7", "Esp\u00e1tula silicona \u2014 Integrar merengue", "En 3 fases: <strong>1\u00aa fase (~40g):</strong> mezcla con energ\u00eda para aligerar la masa. <strong>2\u00aa fase (~40g):</strong> movimientos envolventes lentos, de abajo arriba, girando el bol 45\u00b0 tras cada movimiento. <strong>3\u00aa fase (resto):</strong> igual que la segunda. Para en cuanto no veas vetas blancas."], ["8", "Cuenco Sakura \u2014 Preparar y verter", "Engrasa con los 5g de mantequilla las paredes del cuenco cer\u00e1mico. Vierte la masa con cuidado. Golpea el cuenco suavemente 5-6 veces contra la encimera (con un pa\u00f1o debajo) para eliminar burbujas. <strong>No uses papel de horno dentro del cuenco.</strong>"], ["9", "Sakura \u2014 CAKE 60 min", "Coloca el cuenco en la Sakura. Cierra la tapa. MENU \u2192 <strong>CAKE</strong>. Sube con Min hasta <strong>60 minutos</strong>. Mant\u00e9n pulsado START 2 segundos. <strong>No abras la tapa durante la cocci\u00f3n.</strong>"], ["10", "Sakura \u2014 Comprobaci\u00f3n", "Al pitar, espera 5 min con tapa cerrada. Abre despacio. Prueba con palillo en el centro. <strong>Palillo limpio o migas h\u00famedas:</strong> lista. <strong>Palillo con masa cruda:</strong> CANCEL \u2192 CAKE \u2192 10 min m\u00e1s \u2192 START. El centro debe tener un ligero temblor como panna cotta \u2014 es correcto."], ["11", "Sakura apagada \u2014 Reposo", "Tapa cerrada, KEEP WARM, 15 minutos. Evita el choque t\u00e9rmico que hunde o agrieta la superficie."], ["12", "Encimera + Nevera \u2014 Enfriado", "Saca el cuenco y deja enfriar 1 hora a temperatura ambiente. Cubre con film y a la nevera <strong>m\u00ednimo 4 horas, mejor toda la noche.</strong> Para servir: pasa una esp\u00e1tula por el borde y vuelca con cuidado sobre un plato."]], "horno": [["1", "Encimera \u2014 Atemperado", "Saca queso crema (250g) y mantequilla (40g) de la nevera 30-45 min antes."], ["2", "Horno + molde \u2014 Preparaci\u00f3n", "Precalienta el horno a <strong>160\u00b0C calor arriba y abajo</strong>. Forra un molde desmontable de 18cm con papel de horno en la base y engrasa las paredes. Envuelve el exterior del molde con papel albal para evitar que entre agua del ba\u00f1o mar\u00eda."], ["3", "B\u00e1scula + boles \u2014 Separar huevos", "Separa 4 huevos M. Pesa: ~60g yemas y ~120g claras. Claras a nevera."], ["4", "Cazo + bol \u2014 Base cremosa al ba\u00f1o mar\u00eda", "Queso crema (250g) + mantequilla (40g) + leche (100g) al ba\u00f1o mar\u00eda. Crema lisa. Templar 5 min."], ["5", "Bol + esp\u00e1tula \u2014 Mezcla de yemas", "A\u00f1adir yemas, eritritol 15g, lim\u00f3n 10g, sal 1g, vainilla 2g. Mezclar."], ["6", "Tamizador + esp\u00e1tula \u2014 Harinas", "Tamizar harina de avena (50g) + maicena (20g) e incorporar con movimientos envolventes."], ["7", "Varillas el\u00e9ctricas \u2014 Merengue", "Claras (120g) + eritritol (70g). Picos suaves. STOP."], ["8", "Esp\u00e1tula silicona \u2014 Integrar merengue", "En 3 fases envolventes."], ["9", "Molde + bandeja \u2014 Ba\u00f1o mar\u00eda", "Vierte la masa en el molde. Coloca el molde en una bandeja de horno con <strong>2cm de agua caliente</strong>. El agua del ba\u00f1o mar\u00eda crea el vapor que da la textura cremosa."], ["10", "Horno \u2014 Cocci\u00f3n ba\u00f1o mar\u00eda", "<strong>160\u00b0C, 50-55 minutos.</strong> No abras el horno. La tarta est\u00e1 lista cuando los bordes est\u00e1n firmes y el centro tiembla ligeramente como gelatina."], ["11", "Horno apagado \u2014 Reposo", "Apaga el horno. Deja la tarta dentro con la puerta <strong>entreabierta 10-15 cm</strong> durante 15 minutos. Evita el choque t\u00e9rmico."], ["12", "Encimera + Nevera \u2014 Enfriado", "1 hora ambiente. Luego nevera con film, m\u00ednimo 4 horas. Para servir: desmontar el molde con cuidado."]]};var TIMERS_DATA={"sakura": [null, 300, 480, 300, 300, 3600, 600, 900, 3600, 600], "horno": [null, 900, 300, 480, 300, 300, 3300, 900, 3600, 600]};var PRO=[["Eritritol en grano grueso", "No se integra en el merengue", "Triturarlo hasta polvo fino antes de usar"], ["Claras sobrebatidas", "Pierde el aire y la tarta no sube", "Parar en picos suaves que se doblan. STOP inmediato"], ["Abrir la tapa durante la coccion", "La tarta se hunde o agrieta", "No abrir durante la coccion ni los 15 min de reposo"], ["Centro liquido al salir", "Parece cruda pero es correcto", "El centro debe temblar como panna cotta. En nevera acaba de asentarse"], ["Servir recien hecha", "Textura no asentada", "Mejor de un dia para otro. El reposo nocturno perfecciona la textura"], ["Decoracion que suelta liquido", "Humedece la superficie", "Decorar solo al servir: eritritol glase, frutos rojos o cacao puro"]];var METODOS=["sakura", "horno"];var met=METODOS[0];var servings=1;var checkedIng=new Set(),completedSteps=new Set(),activeStep=null,timerIntervals={},timerValues={};function fmtQty(base,r,unit){if(base===null)return"Al gusto";var v=base*r,u=(unit||"").toLowerCase();if(u.indexOf("hoja")>=0){var n=Math.max(1,Math.round(v));return n+(n>1?" hojas":" hoja");}if(u.indexOf("rama")>=0){var n=Math.max(1,Math.round(v));return n+(n>1?" ramas":" rama");}if(u.indexOf("trozo")>=0){var n=Math.max(1,Math.round(v));return n+(n>1?" trozos":" trozo");}if(u.indexOf("diente")>=0){var n=Math.max(0.5,Math.round(v*2)/2);if(n===Math.floor(n))return n+(n>1?" dientes":" diente");return n.toFixed(1)+" dientes";}if(u.indexOf("cucharad")>=0){var n=Math.max(0.25,Math.round(v*4)/4);var tipo=u.indexOf("cucharadita")>=0?(n<=1?"cucharadita":"cucharaditas"):(n<=1?"cucharada":"cucharadas");var s=n===Math.floor(n)?""+Math.floor(n):(n%0.5===0?n.toFixed(1):""+Math.round(n*4)/4);return s+" "+tipo;}if(u==="g"||u==="ml"||u==="")return Math.max(1,Math.round(v))+(unit?" "+unit:"");var val=Math.round(v*10)/10;return(val===Math.floor(val)?""+Math.floor(val):""+val)+(unit?" "+unit:"");}function fmtTime(s){var m=Math.floor(s/60),sec=s%60;return m+":"+(sec<10?"0":"")+sec;}function renderIng(){var cap=CAPMAX[met]||99,al=document.getElementById("cap-alert");if(servings>cap){al.classList.add("show");al.textContent="Maximo "+cap+" raciones recomendadas para este aparato.";}else al.classList.remove("show");var html="";ING.forEach(function(ing,i){var qty=fmtQty(ing.base,servings,ing.unit),done=checkedIng.has(i);html+="<div class='ing'><div class='ing-l'><div class='chk"+(done?" on":"")+" ' onclick='toggleIng("+i+")' ></div><div><span class='ing-nom"+(done?" on":"")+"'>" +ing.nom+"</span>";if(ing.note)html+="<span class='ing-sub'>"+ing.note+"</span>";html+="</div></div><div class='ing-qty'>"+qty+"</div></div>";});document.getElementById("ing-list").innerHTML=html;}function toggleIng(i){checkedIng.has(i)?checkedIng.delete(i):checkedIng.add(i);renderIng();}function renderTimings(){var rows=TIMINGS[met]||[],html="<div class='tw'><table><thead><tr><th>#</th><th>Accion</th><th>Donde</th><th>Dur.</th><th>Acum.</th></tr></thead><tbody>";rows.forEach(function(r){html+="<tr><td class='tn'>"+r[0]+"</td><td>"+r[1]+"</td><td class='td'>"+r[2]+"</td><td class='td'>"+r[3]+"</td><td class='ta'>"+r[4]+"</td></tr>";});html+="</tbody></table></div>";document.getElementById("timings-list").innerHTML=html;}function startTimer(i){if(timerIntervals[i])return;var tmrs=TIMERS_DATA[met]||[],total=tmrs[i]||0;if(!total)return;var key=met+"-"+i;if(timerValues[key]===undefined)timerValues[key]=total;timerIntervals[i]=setInterval(function(){timerValues[key]--;var el=document.getElementById("tmr-"+i),btn=document.getElementById("btn-tmr-"+i);if(!el)return;if(timerValues[key]<=0){clearInterval(timerIntervals[i]);timerIntervals[i]=null;el.textContent="Listo!";el.className="tmr end";if(btn)btn.style.display="none";}else{el.textContent=fmtTime(timerValues[key]);el.className="tmr run";}},1000);var btn=document.getElementById("btn-tmr-"+i);if(btn){btn.textContent="Parar";btn.className="btn-tmr stop";btn.onclick=function(e){e.stopPropagation();stopTimer(i);};}}function stopTimer(i){clearInterval(timerIntervals[i]);timerIntervals[i]=null;var el=document.getElementById("tmr-"+i),btn=document.getElementById("btn-tmr-"+i);if(el)el.className="tmr";if(btn){btn.textContent="Continuar";btn.className="btn-tmr";btn.onclick=function(e){e.stopPropagation();startTimer(i);};}}function renderPasos(){var pasos=PASOS[met]||[],tmrs=TIMERS_DATA[met]||[],html="";pasos.forEach(function(p,i){var isActive=activeStep===i,isDone=completedSteps.has(i);var key=met+"-"+i,tmrSec=tmrs[i]||0,tmrVal=timerValues[key]!==undefined?timerValues[key]:tmrSec;var tmrCls=timerIntervals[i]?"run":(tmrVal<=0&&tmrSec>0?"end":"");var tmrHtml="";if(tmrSec>0){tmrHtml="<div class='tmr-row'><div class='tmr "+tmrCls+"' id='tmr-"+i+"'>"+(tmrVal<=0?"Listo!":fmtTime(tmrVal))+"</div>";if(tmrVal>0)tmrHtml+="<button class='btn-tmr"+(timerIntervals[i]?" stop":"")+" ' id='btn-tmr-"+i+"' onclick='"+(timerIntervals[i]?"stopTimer":"startTimer")+"("+i+");event.stopPropagation();'>"+(timerIntervals[i]?"Parar":"Iniciar timer")+"</button>";tmrHtml+="</div>";}html+="<div class='step"+(isActive?" active":"")+(isDone?" done":"")+" ' onclick='toggleStep("+i+")' ><div class='step-hd'><div class='step-n'>"+(isDone?"":p[0])+"</div><div class='step-tit'>"+p[1]+"</div>";if(isActive)html+="<button class='btn-done' onclick='doneStep("+i+",event)'>"+(isDone?"Deshacer":"Hecho")+"</button>";html+="</div><div class='step-bod'>"+p[2]+tmrHtml+"</div></div>";});document.getElementById("pasos-list").innerHTML=html;}function toggleStep(i){activeStep=(activeStep===i?null:i);renderPasos();}function doneStep(i,e){e.stopPropagation();completedSteps.has(i)?completedSteps.delete(i):completedSteps.add(i);if(completedSteps.has(i)&&activeStep===i){var pasos=PASOS[met]||[];activeStep=i+1<pasos.length?i+1:null;}renderPasos();}function renderPro(){var html="<div class='pro-grid'>";PRO.forEach(function(p){html+="<div class='pro-item'><b>"+p[0]+"</b><strong>"+p[1]+"</strong> &#8594; "+p[2]+"</div>";});html+="</div>";document.getElementById("pro-list").innerHTML=html;}function changeMet(){met=document.getElementById("met-sel").value;timerIntervals={};activeStep=null;completedSteps.clear();render();}function changeServings(d){servings=Math.max(1,Math.min(12,servings+d));document.getElementById("cnt").textContent=servings;document.getElementById("srv-lbl").textContent=servings===1?"1 persona":servings+" personas";renderIng();}function render(){renderIng();renderTimings();renderPasos();renderPro();}render();</script></body></html>
